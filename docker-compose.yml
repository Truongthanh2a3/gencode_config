volumes:
  dev-mysql-store-81:
  dev-redis-store-72:

services:
  nginx-php-fpm-8.2:
    container_name: dev-nginx-php-fpm-82
    build:
      context: .
      dockerfile: ./nginx-php-fpm-82/Dockerfile
    ports:
      - 1009:8009
      - 1010:8010
      - 1014:8014
      - 1015:8015
    volumes:
      - ./nginx-php-fpm-82/tpl.d:/etc/nginx/tpl.d
      - ./nginx-php-fpm-82/general.conf:/etc/nginx/general.conf
      - ./nginx-php-fpm-82/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - dev-mysql-81
      - dev-redis-72
    networks:
      - dev-backend

  dev-mysql-81:
    container_name: dev-mysql-81
    build:
      context: .
      dockerfile: ./mysql-81/Dockerfile
    ports:
      - 1306:3306
    volumes:
      - type: volume
        source: dev-mysql-store-81
        target: /var/lib/mysql
        volume:
          nocopy: true
    environment:
      MYSQL_ROOT_PASSWORD: Dev-Arisvn1369!
      MYSQL_DATABASE: gencode_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-backend

  dev-redis-72:
    container_name: dev-redis-72
    build:
      context: .
      dockerfile: ./redis-72/Dockerfile
    ports:
      - 1379:6379
    volumes:
      - dev-redis-store-72:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-backend
      
networks:
  dev-backend:
    driver: bridge
